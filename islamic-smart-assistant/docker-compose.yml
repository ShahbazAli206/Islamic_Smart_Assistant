version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: islamic_assistant
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]

  backend:
    build: ./backend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/islamic_assistant
      REDIS_URL: redis://redis:6379
      PORT: 4000
    ports: ["4000:4000"]

  web:
    build: ./web
    depends_on: [backend]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
      NEXT_PUBLIC_WS_URL:  ws://localhost:4000/v1/sync
    ports: ["3000:3000"]

volumes:
  pgdata:
  redisdata:
