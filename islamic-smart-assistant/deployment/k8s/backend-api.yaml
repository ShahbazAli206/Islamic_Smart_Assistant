apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend-api }
  template:
    metadata:
      labels: { app: backend-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/ORG/islamic-assistant-backend:latest
          ports:
            - { containerPort: 4000, name: http }
          envFrom:
            - secretRef: { name: backend-env }
          env:
            - { name: ROLE, value: "api" }
          readinessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
spec:
  selector: { app: backend-api }
  ports:
    - { name: http, port: 80, targetPort: 4000 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
